services:
  prohomeguard:
    build:
      context: .
      dockerfile: Dockerfile
    image: prohomeguard:latest
    container_name: prohomeguard
    restart: unless-stopped
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_SITE_URL: https://prohomeguard.com
      PORT: 3000
      HOSTNAME: 0.0.0.0
    ports:
      - "3000:3000"
